<template>

    <lightning-card title="Covid Tracking Loader">

        <div class="slds-p-around_medium">

            <lightning-button
                label="Cargar Datos Covid"
                variant="brand"
                onclick={loadData}>
            </lightning-button>

            <template if:true={message}>
                <div class="slds-m-top_medium">
                    {message}
                </div>
            </template>

        </div>

    </lightning-card>

</template>
